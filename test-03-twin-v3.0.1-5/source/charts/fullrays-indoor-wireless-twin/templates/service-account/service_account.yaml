apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fullrays-indoor-wireless-twin.name" . }}-sa
  labels:
    {{- include "fullrays-indoor-wireless-twin.labels" . | indent 4 }}
    {{- if .Values.labels }}
      {{ .Values.labels | toYaml | indent 4 }}
    {{- end }}
  annotations:
  {{- include "fullrays-indoor-wireless-twin.product-info" . | indent 4 }}
automountServiceAccountToken: false
