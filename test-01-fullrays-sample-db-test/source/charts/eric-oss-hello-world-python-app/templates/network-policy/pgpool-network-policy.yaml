apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eric-oss-hello-world-python-app.name" . }}-network-policy-pgpool
  labels:
    {{- include "eric-oss-hello-world-python-app.labels" . | indent 4 }}
    {{- if .Values.labels }}
      {{ .Values.labels | toYaml | indent 4 }}
    {{- end }}
  annotations:
  {{- include "eric-oss-hello-world-python-app.product-info" . | indent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql-ha
      app.kubernetes.io/component: pgpool
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: {{ include "eric-oss-hello-world-python-app.name" . }}
    ports:
    - protocol: TCP
      port: 5432  